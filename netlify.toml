# Настройки для хостинга Netlify.
# Главная задача этого файла — разрешить браузеру КЭШИРОВАТЬ (запоминать)
# картинки, стили и скрипты надолго, чтобы при повторном заходе на сайт
# они не скачивались заново, а брались из памяти браузера. Это ускоряет
# все посещения, кроме самого первого.
#
# Почему так можно: содержимое сайта меняется только когда мы делаем git push,
# а имена файлов (mila.jpg, style.css и т.д.) при этом остаются прежними.
# Если вы поменяли КАРТИНКУ, не переименовав файл, у уже заходивших
# посетителей какое-то время может показываться старая версия из кэша —
# в этом случае либо переименуйте файл, либо уменьшите max-age ниже.

# Картинки — кэшируем на год (31536000 секунд).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Стили и скрипты — тоже на год.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Сам HTML (index.html) НЕ кэшируем надолго — он должен обновляться сразу,
# ведь именно в нём прописаны ссылки на всё остальное. 1 час — компромисс.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
